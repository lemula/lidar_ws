excavator_patchwork:
  ros__parameters:
    input_topic: /localmap/body_filtered_points
    ground_topic: /terrain/ground_points
    nonground_topic: /terrain/nonground_points

    # The SDK publishes points in world. Before segmentation, subtract the
    # LiDAR origin so Patchwork++ sees ground near z=-sensor_height.
    sensor_origin_x: 0.3
    sensor_origin_y: -1.3
    sensor_origin_z: 0.624
    sensor_height: 0.624

    num_iter: 3
    num_lpr: 20
    num_min_pts: 10
    th_seeds: 0.30
    th_dist: 0.15
    th_seeds_v: 0.25
    th_dist_v: 0.10
    max_range: 5.0
    min_range: 0.0
    uprightness_thr: 0.707
    adaptive_seed_selection_margin: -1.2
    enable_rvpf: true
    enable_tgr: true
    verbose: false
