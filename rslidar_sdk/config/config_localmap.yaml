common:
  msg_source: 1
  send_packet_ros: false
  send_point_cloud_ros: true

lidar:
  - driver:
      lidar_type: RSAIRY

      msop_port: 6699
      difop_port: 7788
      imu_port: 6688
      user_layer_bytes: 0
      tail_layer_bytes: 0

      min_distance: 0.5
      max_distance: 60
      # Use the ROS host clock so downstream map-age validation is meaningful.
      # RSAIRY's internal clock is time-since-boot (for example sec=523), not epoch time.
      use_lidar_clock: false
      dense_points: false
      ts_first_point: true
      start_angle: 0
      end_angle: 360

      # T_world_rslidar:
      # p_world = Rz(yaw) * Ry(pitch) * Rx(roll) * p_rslidar + t
      # Current values reproduce localmap's derived.v1 axis mapping:
      # Xlocal = Xlidar + 0.3, Ylocal = -Ylidar - 1.3, Zlocal = -Zlidar + 0.624.
      x: 0.3
      y: -1.3
      z: 0.624
      roll: 3.141592653589793
      pitch: 0.0
      yaw: 0.0

      # Keep this fixed extrinsic identical to the localmap Python transformer.
      # RSAIRY DIFOP attitude is not added to the configured mounting rotation.
      transform_use_difop_angles: false

      pcap_repeat: true
      pcap_rate: 1.0
      pcap_path: /home/robosense/lidar.pcap

    ros:
      ros_frame_id: world
      ros_recv_packet_topic: /rslidar_packets
      ros_send_packet_topic: /rslidar_packets
      ros_send_imu_data_topic: /rslidar_imu_data
      ros_send_point_cloud_topic: /localmap/world_points
      ros_queue_length: 100
